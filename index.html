<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetinaClinics HC — Sistema Clínico</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dk:#1a2540;--dk-b:#1f2d4a;--dk-l:#2d3d5c;
  --teal:#0bc5ea;--teal-d:#08a8c9;--teal-bg:#e6f7fa;
  --blue:#3182ce;--blue-l:#ebf8ff;
  --green:#38a169;--green-l:#f0fff4;
  --amber:#d69e2e;--amber-l:#fffff0;
  --red:#e53e3e;--red-l:#fff5f5;
  --orange:#dd6b20;--purple:#805ad5;--purple-l:#faf5ff;
  --g50:#f7fafc;--g100:#edf2f7;--g200:#e2e8f0;
  --g300:#cbd5e0;--g400:#a0aec0;--g500:#718096;
  --g600:#4a5568;--g700:#2d3748;--g800:#1a202c;
  --white:#fff;--topH:46px;--sbW:188px;--rpW:210px;
  --fn:'DM Sans',system-ui,sans-serif;--r:6px}
html,body{height:100%;font-family:var(--fn);background:var(--g100);color:var(--g700);font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* LOGIN */
#login-overlay{position:fixed;inset:0;background:var(--dk);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.login-box{background:var(--white);border-radius:14px;padding:40px 36px;width:420px;max-width:100%;box-shadow:0 28px 70px rgba(0,0,0,.4)}
.login-brand{display:flex;flex-direction:column;align-items:center;margin-bottom:26px}
.login-mark{background:var(--dk);color:var(--teal);font-size:16px;font-weight:800;width:54px;height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;letter-spacing:-.5px;border:2px solid var(--teal)}
.login-title{font-size:21px;font-weight:700;color:var(--g800);letter-spacing:-.4px}
.login-sub{font-size:12px;color:var(--g500);margin-top:3px}
.login-hint{background:var(--blue-l);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--blue);margin-bottom:16px;line-height:1.6}
.login-hint strong{display:block;margin-bottom:2px}
.login-err{background:var(--red-l);border:1px solid #fed7d7;border-radius:var(--r);padding:9px 12px;font-size:12.5px;color:var(--red);margin-top:10px;display:none}

/* TOP BAR */
#top-bar{position:fixed;top:0;left:0;right:0;height:var(--topH);background:var(--dk);display:flex;align-items:center;padding:0 16px;z-index:200;border-bottom:1px solid var(--dk-b)}
.tb-brand{display:flex;align-items:center;gap:9px;padding-right:16px;margin-right:16px;border-right:1px solid var(--dk-b);flex-shrink:0}
.tb-logo{background:var(--teal);color:var(--dk);font-size:10px;font-weight:800;width:27px;height:27px;border-radius:5px;display:flex;align-items:center;justify-content:center;letter-spacing:-.5px}
.tb-appname{color:var(--white);font-size:13.5px;font-weight:700;white-space:nowrap;letter-spacing:-.2px}
.tb-doc{color:var(--g400);font-size:12px;display:flex;align-items:center;gap:6px;flex-shrink:0;white-space:nowrap}
.tb-doc strong{color:var(--white)}
.tb-date{color:var(--g400);font-size:12px;flex:1;text-align:center;white-space:nowrap}
.tb-nav{display:flex;align-items:center;gap:2px;margin-left:auto}
.tb-btn{color:var(--g300);font-size:12.5px;padding:5px 11px;border-radius:4px;border:none;background:transparent;cursor:pointer;font-family:var(--fn);transition:.12s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tb-btn:hover,.tb-btn.open{background:var(--dk-b);color:var(--white)}
.tb-user-pill{display:flex;align-items:center;gap:8px;color:var(--g300);font-size:12.5px;cursor:pointer;padding:4px 10px;border-radius:5px;border-left:1px solid var(--dk-b);margin-left:4px;transition:.12s}
.tb-user-pill:hover{background:var(--dk-b);color:var(--white)}
.tb-av{width:27px;height:27px;border-radius:50%;background:var(--teal);color:var(--dk);display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;flex-shrink:0}

/* DROPDOWN */
.dd{position:relative}
.dd-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--white);border:1px solid var(--g200);border-radius:8px;box-shadow:0 10px 28px rgba(0,0,0,.14);min-width:185px;padding:4px 0;z-index:300}
.dd-menu.open{display:block}
.dd-item{display:flex;align-items:center;gap:8px;padding:8px 14px;color:var(--g700);font-size:13px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-family:var(--fn);transition:.1s}
.dd-item:hover{background:var(--g50);color:var(--blue)}
.dd-sep{border:none;border-top:1px solid var(--g100);margin:3px 0}
.dd-label{padding:6px 14px 2px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--g400)}

/* LAYOUT */
#app-body{display:flex;padding-top:var(--topH);height:100vh}
#sidebar{width:var(--sbW);background:var(--dk);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid var(--dk-b)}
#main{flex:1;overflow-y:auto;min-width:0}

/* APP SIDEBAR */
.sb-sep{height:1px;background:var(--dk-b);margin:4px 0}
.sb-lbl{font-size:9px;font-weight:700;color:#3d5a80;text-transform:uppercase;letter-spacing:1.2px;padding:10px 13px 3px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 13px;border:none;background:transparent;width:100%;text-align:left;cursor:pointer;color:#7a9cc6;font-family:var(--fn);font-size:12.5px;font-weight:500;transition:.12s;border-left:3px solid transparent}
.sb-item:hover{background:rgba(255,255,255,.06);color:#c0d4ec}
.sb-item.active{background:rgba(11,197,234,.1);color:var(--teal);border-left-color:var(--teal)}
.sb-ico{width:17px;text-align:center;font-size:13px;flex-shrink:0}
/* PATIENT SIDEBAR */
.ps-header{padding:12px 13px;border-bottom:1px solid var(--dk-b)}
.ps-label{font-size:9px;color:#3d5a80;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.ps-name{color:var(--white);font-size:13px;font-weight:700;line-height:1.3}
.ps-ci{color:var(--g500);font-size:11px;margin-top:2px}
.ps-item{display:flex;align-items:center;gap:9px;padding:7px 13px;border:none;background:transparent;width:100%;text-align:left;cursor:pointer;color:#7a9cc6;font-family:var(--fn);font-size:12.5px;font-weight:500;transition:.12s;border-left:3px solid transparent}
.ps-item:hover{background:rgba(255,255,255,.06);color:#c0d4ec}
.ps-item.active{background:rgba(11,197,234,.1);color:var(--teal);border-left-color:var(--teal)}

/* PAGE HEADER */
.ph{background:var(--white);padding:13px 22px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.ph-title{font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--g800)}
.ph-sub{font-size:11.5px;color:var(--g500);margin-top:1px}
.ph-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.ca{padding:16px 22px}

/* HC LAYOUT */
.hc-wrap{display:flex;min-height:calc(100vh - var(--topH));background:var(--g100)}
.hc-main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--g50)}
.hc-right{width:var(--rpW);flex-shrink:0;background:var(--white);border-left:1px solid var(--g200);overflow-y:auto}

/* PATIENT HEADER */
.pat-hdr{background:var(--dk);color:var(--white);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pat-hdr-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
.pat-hdr-bread{font-size:11.5px;color:var(--g400)}
.pat-hdr-bread span{color:var(--teal);cursor:pointer;transition:.1s}
.pat-hdr-bread span:hover{text-decoration:underline}
.pat-hdr-actions{display:flex;gap:7px;align-items:center}

/* ENCOUNTER NAV */
.enc-nav{background:var(--white);border-bottom:1px solid var(--g200);padding:7px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
.enc-nav-btn{padding:4px 8px;border:1px solid var(--g300);background:var(--white);border-radius:4px;cursor:pointer;font-size:13px;color:var(--g600);transition:.12s;font-family:var(--fn)}
.enc-nav-btn:hover{background:var(--g100)}
.enc-nav-btn.teal{background:var(--teal);color:var(--white);border-color:var(--teal);font-weight:600}
.enc-nav-btn.teal:hover{background:var(--teal-d)}
.enc-date{padding:4px 11px;border:1px solid var(--g300);border-radius:4px;background:var(--white);font-size:12.5px;font-weight:600;min-width:130px;text-align:center;color:var(--g700)}
.enc-counter{font-size:11.5px;color:var(--g400)}

/* HC TABS */
.hc-tabbar{background:var(--dk);display:flex;padding:0 14px;gap:1px;border-bottom:2px solid var(--teal);overflow-x:auto;flex-shrink:0}
.hc-tab{padding:8px 13px 9px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:rgba(255,255,255,.05);color:var(--g400);font-family:var(--fn);transition:.12s;border-radius:4px 4px 0 0;white-space:nowrap;flex-shrink:0}
.hc-tab:hover{background:rgba(255,255,255,.1);color:var(--white)}
.hc-tab.active{background:var(--white);color:var(--dk);font-weight:700}

/* HC SECTION CARD */
.hc-sec{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);margin:12px 14px;overflow:hidden}
.hc-sec-hdr{background:var(--dk);color:var(--white);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12.5px;font-weight:700}
.hc-sec-hdr .ico{background:rgba(11,197,234,.18);color:var(--teal);width:22px;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11.5px}
.hc-sec-body{padding:13px}

/* OPTOMETRY TABLE */
.opto-wrap{overflow-x:auto;margin-bottom:12px}
.opto-t{width:100%;border-collapse:collapse;font-size:12px;min-width:400px}
.opto-t th{padding:5px 6px;text-align:center;background:var(--dk);color:var(--white);font-size:10px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.opto-t td{padding:3px 4px;text-align:center;vertical-align:middle}
.opto-t tr:nth-child(even) td{background:var(--g50)}
.opto-eye{font-weight:700;background:var(--dk)!important;color:var(--teal);font-size:10.5px;padding:5px 8px;text-align:left!important;white-space:nowrap}
.opto-in{width:100%;padding:3px 4px;border:1px solid var(--g200);border-radius:3px;font-size:12px;text-align:center;font-family:var(--fn);outline:none;min-width:50px;background:var(--white)}
.opto-in:focus{border-color:var(--teal)}
.opto-lbl{font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* IOP ROWS */
.pio-grid{display:grid;grid-template-columns:120px 75px 55px 55px 75px 75px 30px;gap:5px;align-items:center;margin-bottom:5px}
.pio-hdr{font-size:10.5px;font-weight:700;text-align:center;color:var(--g500);text-transform:uppercase;letter-spacing:.4px}

/* DX ROWS */
.dx-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--g200);border-radius:5px;margin-bottom:6px;background:var(--white);transition:.1s}
.dx-row:hover{background:var(--g50)}

/* ENTITY SELECT (dynamic diagnoses) */
.ent-row{display:flex;gap:6px;align-items:flex-start}
.ent-row .fs{flex:1}
.ent-add{display:none;gap:6px;align-items:center;margin-top:5px;padding:8px 10px;background:var(--teal-bg);border:1.5px dashed var(--teal);border-radius:5px}
.ent-add .fi{flex:1}

/* RIGHT PANEL */
.rp-top{background:var(--dk);color:var(--white);padding:13px 14px;text-align:center;border-bottom:1px solid var(--dk-b)}
.rp-age{font-size:22px;font-weight:700;color:var(--teal)}
.rp-type{font-size:10px;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-top:2px}
.rp-lbl{font-size:9.5px;color:var(--g400);font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:8px 13px 3px}
.rp-link{display:flex;align-items:center;gap:7px;padding:6px 13px;cursor:pointer;color:var(--g600);font-size:12.5px;border:none;background:transparent;width:100%;text-align:left;font-family:var(--fn);transition:.1s}
.rp-link:hover{background:var(--g50);color:var(--blue)}
.rp-link.current{color:var(--teal);font-weight:600}
.rp-sep{border:none;border-top:1px solid var(--g100);margin:3px 0}

/* CARDS */
.card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r)}
.card.pad{padding:16px 18px}.card.p0{padding:0}
.card-hdr{padding:12px 15px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between}
.card-hdr-t{font-size:13px;font-weight:700}

/* FORMS */
.fg{margin-bottom:12px}
.fl{display:block;font-size:11.5px;font-weight:700;color:var(--g500);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.req{color:var(--red)}.fhint{font-size:11px;color:var(--g400);margin-top:3px}
.fi,.fs,.ft{width:100%;padding:7px 10px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:var(--fn);font-size:13.5px;color:var(--g700);background:var(--white);outline:none;transition:.15s}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(11,197,234,.1)}
.ft{resize:vertical;min-height:65px}
.fi-sm{padding:5px 8px;font-size:12.5px}
.fi-sm{padding:5px 8px;font-size:12.5px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.form-sec{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--g500);padding-bottom:8px;border-bottom:1px solid var(--g200);margin-bottom:12px}
.form-val{padding:7px 10px;background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--r);font-size:13.5px;font-weight:600}
.form-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--g200)}
.form-err{background:var(--red-l);border:1px solid #fed7d7;border-radius:var(--r);padding:9px 13px;font-size:12.5px;color:var(--red);margin-top:10px}
.form-err div{padding:1px 0}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-family:var(--fn);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.12s;white-space:nowrap}
.btn-primary{background:var(--blue);color:var(--white)}.btn-primary:hover{background:#2b6cb0}
.btn-teal{background:var(--teal);color:var(--white)}.btn-teal:hover{background:var(--teal-d)}
.btn-dark{background:var(--dk);color:var(--white)}.btn-dark:hover{background:var(--dk-l)}
.btn-ghost{background:transparent;color:var(--g600);border:1px solid var(--g300)}.btn-ghost:hover{background:var(--g100)}
.btn-danger{background:var(--red);color:var(--white)}.btn-danger:hover{background:#c53030}
.btn-sm{padding:5px 11px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11.5px}
.btn-full{width:100%;justify-content:center}
.btn-link{background:none;border:none;color:var(--blue);cursor:pointer;font-size:13px;padding:0;font-weight:600;font-family:var(--fn)}
.btn-link:hover{text-decoration:underline}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;font-size:14px;opacity:.65;transition:.12s}
.btn-icon:hover{opacity:1;background:var(--g100)}

/* BADGES & MISC */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap}
.b-blue{background:var(--blue-l);color:var(--blue)}.b-teal{background:var(--teal-bg);color:var(--teal-d)}
.b-green{background:var(--green-l);color:var(--green)}.b-amber{background:var(--amber-l);color:var(--amber)}
.b-red{background:var(--red-l);color:var(--red)}.b-gray{background:var(--g100);color:var(--g500)}
.b-purple{background:var(--purple-l);color:var(--purple)}.b-orange{background:#fff8f0;color:var(--orange)}
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:8px 12px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);background:var(--g50);border-bottom:1px solid var(--g200)}
.data-table td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--g100);vertical-align:middle}
.data-table tbody tr:hover td{background:var(--g50)}
.search-wrap{position:relative}
.search-in{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:var(--fn);font-size:13px;background:var(--white);outline:none;transition:.15s}
.search-in:focus{border-color:var(--teal)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:15px;pointer-events:none}
.pat-cell{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));color:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.kpi4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.kpi-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:13px 15px;border-top:3px solid}
.kpi-card.blue{border-top-color:var(--blue)}.kpi-card.teal{border-top-color:var(--teal)}
.kpi-card.green{border-top-color:var(--green)}.kpi-card.amber{border-top-color:var(--amber)}
.kpi-card.red{border-top-color:var(--red)}.kpi-card.gray{border-top-color:var(--g400)}
.kv{font-size:24px;font-weight:700;line-height:1}.kl{font-size:10.5px;color:var(--g500);margin-top:3px}
.info-list{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px}
.info-list dt{color:var(--g400);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.alert{padding:10px 13px;border-radius:var(--r);font-size:12.5px;margin-bottom:12px;line-height:1.5}
.alert-info{background:var(--blue-l);border:1px solid #bee3f8;color:var(--blue)}
.alert-teal{background:var(--teal-bg);border:1px solid #b2ebf2;color:var(--teal-d)}
.sh{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.sh-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500);white-space:nowrap}
.sh-d{flex:1;height:1px;background:var(--g200)}
.empty{text-align:center;padding:44px 20px}
.empty-ico{font-size:36px;margin-bottom:9px}.empty-t{font-size:14px;font-weight:700;color:var(--g700);margin-bottom:4px}.empty-s{font-size:12.5px;color:var(--g400);margin-bottom:14px}
.empty-mini{padding:16px;text-align:center;color:var(--g400);font-size:12.5px}
.fw7{font-weight:700}.txt2{color:var(--g500)}.txt-m{color:var(--g400)}.txt-sm{font-size:12px}
.mb10{margin-bottom:10px}.mb14{margin-bottom:14px}.mb18{margin-bottom:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.seg-badge{background:var(--purple-l);color:var(--purple);display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:20px;font-size:10.5px;font-weight:700}
.stat-row{display:flex;gap:14px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 14px;background:var(--g50);border-radius:var(--r);border:1px solid var(--g200);min-width:76px}
.stat-val{font-size:18px;font-weight:700;color:var(--g800)}.stat-lbl{font-size:10.5px;color:var(--g500);text-align:center}
.role-pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase}
.role-admin{background:var(--red-l);color:var(--red)}.role-doctor{background:var(--blue-l);color:var(--blue)}
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{padding:11px 16px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.16);max-width:330px;pointer-events:auto;transition:opacity .4s,transform .4s}
.t-success{background:#276749;color:#fff}.t-error{background:#9b2c2c;color:#fff}.t-warn{background:#975a16;color:#fff}
.toast-out{opacity:0;transform:translateY(8px)}
/* PROC GRID (multi-procedure surgery) */
.proc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.proc-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid var(--g200);border-radius:5px;cursor:pointer;font-size:13px;transition:.12s;background:var(--white)}
.proc-item:hover{border-color:var(--teal);background:var(--teal-bg)}
.proc-item.sel{border-color:var(--teal);background:var(--teal-bg)}
.proc-item input{width:14px;height:14px;accent-color:var(--teal);cursor:pointer;flex-shrink:0}
/* CHECKLIST */
.cl-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:5px;cursor:pointer;font-size:12.5px;transition:.1s}
.cl-item:hover{background:var(--g50)}.cl-item input{width:14px;height:14px;accent-color:var(--green);cursor:pointer}
.cl-status{padding:8px 12px;border-radius:var(--r);font-size:12.5px;font-weight:700;text-align:center;margin-bottom:10px}
.cl-status.ready{background:var(--green-l);color:var(--green)}.cl-status.pending{background:var(--amber-l);color:var(--amber)}
/* FILTER TABS */
.ftabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.ftab{padding:5px 12px;border-radius:20px;border:1.5px solid var(--g200);background:var(--white);font-family:var(--fn);font-size:12px;font-weight:600;cursor:pointer;transition:.12s;color:var(--g500)}
.ftab:hover{border-color:var(--teal);color:var(--teal)}.ftab.active{background:var(--dk);border-color:var(--dk);color:var(--white)}
.ftab-n{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);border-radius:10px;padding:0 5px;font-size:10px;margin-left:3px;min-width:16px}
.ftab:not(.active) .ftab-n{background:var(--g100);color:var(--g400)}
/* ── DASHBOARD ──────────────────────────────── */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.dash-kpi{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:15px 17px;position:relative;overflow:hidden}
.dash-kpi::after{content:'';position:absolute;bottom:-12px;right:-12px;width:64px;height:64px;border-radius:50%;opacity:.08}
.dash-kpi.blue::after{background:var(--blue)}.dash-kpi.teal::after{background:var(--teal)}
.dash-kpi.green::after{background:var(--green)}.dash-kpi.amber::after{background:var(--amber)}
.dash-kpi.red::after{background:var(--red)}.dash-kpi.purple::after{background:var(--purple)}
.dash-kpi-ico{font-size:20px;margin-bottom:8px;display:block}
.dash-kpi-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);margin-bottom:2px}
.dash-kpi-val{font-size:28px;font-weight:700;line-height:1;color:var(--g800);margin-bottom:3px}
.dash-kpi-sub{font-size:11.5px;color:var(--g400)}
.dash-kpi-trend{font-size:11px;font-weight:700;margin-top:4px}
.trend-up{color:var(--green)}.trend-down{color:var(--red)}.trend-flat{color:var(--g400)}
.dash-kpi-bar{height:3px;border-radius:2px;margin-top:10px;background:var(--g100)}
.dash-kpi-bar-fill{height:100%;border-radius:2px}
.dash-kpi.blue .dash-kpi-bar-fill{background:var(--blue)}
.dash-kpi.teal .dash-kpi-bar-fill{background:var(--teal)}
.dash-kpi.green .dash-kpi-bar-fill{background:var(--green)}
.dash-kpi.amber .dash-kpi-bar-fill{background:var(--amber)}
.dash-kpi.purple .dash-kpi-bar-fill{background:var(--purple)}
/* Chart cards */
.chart-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:16px 18px}
.chart-card-title{font-size:13px;font-weight:700;color:var(--g800);margin-bottom:3px}
.chart-card-sub{font-size:11.5px;color:var(--g400);margin-bottom:14px}
.chart-wrap{position:relative}
/* Period selector */
.period-tabs{display:flex;gap:4px;margin-bottom:16px}
.period-tab{padding:5px 14px;border-radius:20px;border:1.5px solid var(--g200);background:var(--white);font-family:var(--fn);font-size:12px;font-weight:600;cursor:pointer;transition:.12s;color:var(--g500)}
.period-tab:hover{border-color:var(--teal);color:var(--teal)}
.period-tab.active{background:var(--dk);border-color:var(--dk);color:var(--white)}
/* Mini horizontal bar */
.mini-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.mini-bar-label{font-size:12px;color:var(--g600);min-width:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-bar-track{width:120px;flex-shrink:0;background:var(--g100);border-radius:3px;height:10px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:3px}
.mini-bar-num{font-size:11.5px;font-weight:700;color:var(--g700);min-width:24px;text-align:right;flex-shrink:0}
/* Activity feed */
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--g100)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.activity-dot.inj{background:var(--blue)}.activity-dot.sx{background:var(--teal)}
.activity-dot.cita{background:var(--green)}.activity-dot.pac{background:var(--purple)}
.activity-content{flex:1;min-width:0}
.activity-title{font-size:12.5px;font-weight:600;color:var(--g700)}
.activity-meta{font-size:11.5px;color:var(--g400);margin-top:1px}
/* Status distribution */
.status-dist-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-dist-label{font-size:12.5px;color:var(--g600);flex:1}
.status-dist-val{font-size:12.5px;font-weight:700;color:var(--g700)}
#print-area{display:none}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:white!important;margin:0;padding:0}
  #app,#login-overlay,#toasts{display:none!important}
  #print-area{display:block!important}
  @page{size:A4;margin:14mm 16mm 16mm 16mm}
  .no-print{display:none!important}
}
/* Print document base */
.print-doc{font-family:'DM Sans',Arial,sans-serif;color:#1a202c;font-size:11.5px;line-height:1.5;background:#fff}
/* Header */
.p-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:10px;margin-bottom:14px;border-bottom:3px solid #1a2540}
.p-hdr-left{display:flex;align-items:center;gap:12px}
.p-logo{background:#1a2540;color:#0bc5ea;font-size:13px;font-weight:900;width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;letter-spacing:-.5px;flex-shrink:0}
.p-clinic{font-size:16px;font-weight:800;color:#1a2540;letter-spacing:-.3px}
.p-spec{font-size:11px;color:#718096;margin-top:2px}
.p-hdr-right{text-align:right;font-size:11px;color:#718096}
.p-hdr-right strong{display:block;font-size:13px;color:#1a2540;margin-bottom:2px}
/* Patient banner */
.p-pat-banner{background:#1a2540;color:#fff;padding:10px 14px;border-radius:6px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.p-pat-name{font-size:17px;font-weight:800;letter-spacing:-.3px}
.p-pat-meta{font-size:11px;color:#94a3b8;margin-top:2px}
.p-pat-right{text-align:right;font-size:11px;color:#94a3b8}
.p-pat-right strong{display:block;font-size:14px;color:#0bc5ea;font-weight:800}
/* Sections */
.p-section{margin-bottom:12px}
.p-section-title{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#0369a1;border-bottom:1.5px solid #dbeafe;padding-bottom:4px;margin-bottom:8px}
/* Two column */
.p-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.p-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
/* Info rows */
.p-row{display:flex;margin-bottom:4px;font-size:11px}
.p-row-label{color:#718096;font-weight:700;min-width:110px;flex-shrink:0;text-transform:uppercase;font-size:9.5px;letter-spacing:.3px;padding-top:1px}
.p-row-val{color:#1a202c;flex:1}
/* Tables */
.p-table{width:100%;border-collapse:collapse;font-size:10.5px;margin-bottom:10px}
.p-table th{background:#1a2540;color:#fff;padding:5px 8px;text-align:center;font-size:9.5px;font-weight:700;letter-spacing:.3px}
.p-table td{padding:4px 8px;text-align:center;border:1px solid #e2e8f0;vertical-align:middle}
.p-table tr:nth-child(even) td{background:#f7fafc}
.p-table .eye-lbl{background:#1a2540;color:#0bc5ea;font-weight:700;text-align:left!important;padding:5px 8px;font-size:9.5px}
/* KPI strip */
.p-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.p-kpi{border:1.5px solid #e2e8f0;border-radius:5px;padding:8px 10px;text-align:center;border-top:3px solid #0369a1}
.p-kpi .v{font-size:22px;font-weight:800;color:#1a2540;line-height:1}
.p-kpi .l{font-size:9px;color:#718096;margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
/* Diagnoses */
.p-dx{display:flex;align-items:center;gap:8px;padding:5px 8px;border:1px solid #e2e8f0;border-radius:4px;margin-bottom:4px}
.p-dx-pill{background:#ebf8ff;color:#2b6cb0;padding:2px 8px;border-radius:20px;font-size:9.5px;font-weight:700}
/* Textbox */
.p-textbox{border:1px solid #e2e8f0;border-radius:4px;padding:7px 10px;min-height:36px;font-size:11px;line-height:1.5;white-space:pre-wrap;color:#1a202c;margin-bottom:8px}
.p-textbox.empty{color:#a0aec0;font-style:italic}
/* Checklist */
.p-cl{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.p-cl-item{display:flex;align-items:center;gap:6px;font-size:10.5px}
.p-cl-box{width:13px;height:13px;border:1.5px solid #718096;border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px}
.p-cl-box.checked{background:#1a2540;border-color:#1a2540;color:#0bc5ea}
/* Signature area */
.p-sig{margin-top:20px;padding-top:12px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end}
.p-sig-box{text-align:center;min-width:200px}
.p-sig-line{border-bottom:1px solid #1a202c;height:36px;margin-bottom:5px}
.p-sig-name{font-size:11.5px;font-weight:700;color:#1a202c}
.p-sig-spec{font-size:10px;color:#718096}
/* Footer */
.p-foot{display:flex;justify-content:space-between;font-size:9px;color:#a0aec0;padding-top:8px;border-top:1px solid #e2e8f0;margin-top:10px}
/* Ant sys checkboxes row */
.p-ant-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px}
.p-ant-item{display:flex;align-items:center;gap:5px;font-size:10px}
/* Monthly report */
.p-month-bar{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.p-month-bar .lbl{font-size:10px;color:#718096;width:28px;text-align:right}
.p-month-bar .bar-wrap{flex:1;background:#f1f5f9;border-radius:2px;height:12px;overflow:hidden}
.p-month-bar .bar-fill{height:100%;background:#0369a1;border-radius:2px}
.p-month-bar .num{font-size:10px;font-weight:700;width:20px}
.agenda-tabs{display:flex;background:var(--white);border-bottom:1px solid var(--g200);padding:0 22px;flex-shrink:0}
.agenda-tab{padding:10px 16px 11px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;font-family:var(--fn);color:var(--g400);border-bottom:3px solid transparent;transition:.12s}
.agenda-tab:hover{color:var(--g700)}
.agenda-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.agenda-tab-n{display:inline-flex;align-items:center;justify-content:center;background:var(--red-l);color:var(--red);border-radius:10px;padding:0 6px;font-size:10px;font-weight:700;margin-left:5px;min-width:18px}
.agenda-tab-n.ok{background:var(--green-l);color:var(--green)}
.agenda-tab-n.warn{background:var(--amber-l);color:var(--amber)}
/* Appointment card */
.cita-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.12s;border-left:4px solid var(--g300)}
.cita-card:hover{border-color:var(--g300);background:var(--g50)}
.cita-card.urgente{border-left-color:var(--red)}
.cita-card.hoy{border-left-color:var(--teal)}
.cita-card.programada{border-left-color:var(--blue)}
.cita-card.pendiente{border-left-color:var(--purple)}
.cita-time{font-size:15px;font-weight:700;color:var(--dk);min-width:50px;text-align:center}
.cita-time .ampm{font-size:10px;color:var(--g400);display:block;font-weight:400}
.cita-info{flex:1;min-width:0}
.cita-name{font-size:13.5px;font-weight:700;color:var(--g800)}
.cita-meta{font-size:12px;color:var(--g500);margin-top:2px}
.cita-actions{display:flex;gap:5px;align-items:center;flex-shrink:0}
/* Notification badge in top bar */
.notif-badge{position:relative;display:inline-flex}
.notif-dot{position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:var(--red);border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--dk)}
/* Day header */
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.day-circle{width:46px;height:46px;border-radius:50%;background:var(--teal);color:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.day-num{font-size:18px;font-weight:700;line-height:1}
.day-mon{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.day-info{flex:1}
.day-title{font-size:15px;font-weight:700;color:var(--g800)}
.day-sub{font-size:12px;color:var(--g500);margin-top:1px}
/* Follow-up urgency row */
.fu-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);margin-bottom:6px;cursor:pointer;transition:.12s}
.fu-row:hover{opacity:.85}
.fu-row.muy-atrasado{background:#fef2f2;border:1px solid #fecaca}
.fu-row.atrasado{background:var(--amber-l);border:1px solid #fde68a}
.fu-row.esta-semana{background:#fff8f0;border:1px solid #fed7aa}
.fu-row.proximo{background:var(--blue-l);border:1px solid #bfdbfe}
.fu-days{font-size:20px;font-weight:700;min-width:44px;text-align:center;flex-shrink:0}
.fu-name{font-size:13.5px;font-weight:700;flex:1}
.fu-meta{font-size:11.5px;color:var(--g500);margin-top:1px}
/* Quick new cita form */
.cita-form-inline{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:14px;margin-bottom:12px}
/* Pendiente banner in HC */
.pendiente-banner{background:var(--purple-l);border:1px solid #c4b5fd;border-radius:var(--r);padding:9px 14px;display:flex;align-items:center;gap:10px;margin:0 0 0 0}
/* Alert blocks */
.alert-block{border-radius:var(--r);padding:11px 14px;margin-bottom:10px;border-left:4px solid}
.alert-block.red{background:#fef2f2;border-left-color:var(--red)}
.alert-block.amber{background:var(--amber-l);border-left-color:var(--amber)}
.alert-block.blue{background:var(--blue-l);border-left-color:var(--blue)}
.alert-block.green{background:var(--green-l);border-left-color:var(--green)}
.alert-block.purple{background:var(--purple-l);border-left-color:var(--purple)}
.sx-programada{background:var(--blue-l);color:var(--blue)}
.sx-pendiente_economico{background:var(--amber-l);color:var(--amber)}
.sx-realizada{background:var(--green-l);color:var(--green)}
.sx-cancelada{background:var(--g100);color:var(--g500)}
/* QX CARD in HC tab */
.sx-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.sx-card:hover{border-color:var(--g300)}
@media print{body{background:white}#app,#login-overlay{display:none!important}}

function sbH(extra={}){
  return{
    'apikey': SB_KEY(),
    'Authorization': `Bearer ${SB_KEY()}`,
    'Content-Type': 'application/json',
    ...extra
  };
}

// ── Background upsert (fire-and-forget, never blocks UI) ──
function sbUpsert(table, record){
  if(!sbOK()) return;
  fetch(`${SB_URL()}/rest/v1/${table}`, {
    method:'POST',
    headers: sbH({'Prefer':'resolution=merge-duplicates,return=minimal'}),
    body: JSON.stringify(record)
  }).then(r=>{
    if(r.ok){ sSet('rc_sb_status','online'); updateSbIndicator(); }
    else{ sSet('rc_sb_status','error'); updateSbIndicator(); }
  }).catch(()=>{ sSet('rc_sb_status','error'); updateSbIndicator(); });
}

// ── Background delete ──
function sbDelete(table, id){
  if(!sbOK()) return;
  fetch(`${SB_URL()}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
    method:'DELETE',
    headers: sbH()
  }).catch(()=>{});
}

// ── Pull all data from Supabase → localStorage ──
async function sbPull(){
  if(!sbOK()) return false;
  const did = MY_DID();
  const tables = [
    {key:'rc_p',    table:'rc_patients'},
    {key:'rc_i',    table:'rc_injections'},
    {key:'rc_s',    table:'rc_surgeries'},
    {key:'rc_enc',  table:'rc_encounters'},
    {key:'rc_citas',table:'rc_citas'},
    {key:'rc_diags',table:'rc_catalogs', filter:`type=eq.diag`},
    {key:'rc_sxt',  table:'rc_catalogs', filter:`type=eq.sxt`}
  ];
  try{
    let anyData = false;
    for(const t of tables){
      const didFilter = SESSION.role==='super_admin' ? '' : `did=eq.${encodeURIComponent(did)}`;
      const filter    = [didFilter, t.filter].filter(Boolean).join('&');
      const url       = `${SB_URL()}/rest/v1/${t.table}?${filter}&select=id,data`;
      const res       = await fetch(url, { headers: sbH() });
      if(!res.ok) continue;
      const rows = await res.json();
      if(!rows.length) continue;
      anyData = true;
      const local = sGet(t.key) || [];
      const merged = [...local];
      rows.forEach(row=>{
        if(!row.data) return;
        const rec = row.data;
        const idx = merged.findIndex(l=>l.id===rec.id);
        if(idx>=0) merged[idx]=rec; else merged.push(rec);
      });
      sSet(t.key, merged);
    }
    sSet('rc_sb_status','online');
    updateSbIndicator();
    return anyData;
  }catch(e){
    sSet('rc_sb_status','error');
    updateSbIndicator();
    return false;
  }
}

// ── Push all localStorage data → Supabase ──
async function sbPushAll(){
  if(!sbOK()) return {ok:false, msg:'Sin configuración de backend.'};
  const did = MY_DID();
  const sets = [
    {key:'rc_p',    table:'rc_patients',   pid:null},
    {key:'rc_i',    table:'rc_injections', pid:'pid'},
    {key:'rc_s',    table:'rc_surgeries',  pid:'pid'},
    {key:'rc_enc',  table:'rc_encounters', pid:'pid'},
    {key:'rc_citas',table:'rc_citas',      pid:'pid'},
  ];
  const diagRecords = (sGet('rc_diags')||[]).filter(d=>d.did===did).map(d=>({id:d.id,did:d.did,org_id:d.org_id||MY_ORG(),type:'diag',data:d}));
  const sxtRecords  = (sGet('rc_sxt') ||[]).filter(s=>s.did===did).map(s=>({id:s.id,did:s.did,org_id:s.org_id||MY_ORG(),type:'sxt', data:s}));
  const catalogBatch= [...diagRecords,...sxtRecords];
  let total=0, errors=0;
  try{
    for(const s of sets){
      const records = (sGet(s.key)||[]).filter(r=>SESSION.role==='super_admin'||r.did===did);
      for(const r of records){
        const row = {id:r.id, did:r.did||did, org_id:r.org_id||MY_ORG(), data:r};
        if(s.pid && r[s.pid]) row.pid = r[s.pid];
        const res = await fetch(`${SB_URL()}/rest/v1/${s.table}`, {
          method:'POST',
          headers: sbH({'Prefer':'resolution=merge-duplicates,return=minimal'}),
          body: JSON.stringify(row)
        });
        res.ok ? total++ : errors++;
      }
    }
    for(const r of catalogBatch){
      const res = await fetch(`${SB_URL()}/rest/v1/rc_catalogs`, {
        method:'POST',
        headers: sbH({'Prefer':'resolution=merge-duplicates,return=minimal'}),
        body: JSON.stringify(r)
      });
      res.ok ? total++ : errors++;
    }
    sSet('rc_sb_status','online');
    updateSbIndicator();
    return {ok:true, total, errors};
  }catch(e){
    sSet('rc_sb_status','error');
    updateSbIndicator();
    return {ok:false, msg:e.message};
  }
}

async function sbTestConnection(url, key){

function importData(){
  const input = document.createElement('input');
  input.type  = 'file'; input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0]; if(!file) return;
    try{
      const text = await file.text();
      const bk   = JSON.parse(text);
      if(!bk.version || !bk.patients) throw new Error('Archivo de backup inválido.');
      if(!confirm(`¿Importar backup del ${bk.exportedAt?.split('T')[0]||'?'}?\n\nEsto FUSIONARÁ los datos del backup con los actuales.\nNo se eliminarán datos existentes.`)) return;
      // Merge each collection
      const merge = (key, arr) => {
        const current = sGet(key)||[];
        arr.forEach(r=>{ const i=current.findIndex(x=>x.id===r.id); i>=0?current[i]=r:current.push(r); });
        sSet(key, current);
      };
      merge('rc_p',     bk.patients   ||[]);
      merge('rc_i',     bk.injections ||[]);
      merge('rc_s',     bk.surgeries  ||[]);
      merge('rc_enc',   bk.encounters ||[]);
      merge('rc_citas', bk.citas      ||[]);
      merge('rc_diags', bk.diags      ||[]);
      merge('rc_sxt',   bk.sxtypes    ||[]);
      toast('✅ Datos importados correctamente. Recargando…','success');
      setTimeout(()=>location.reload(), 1500);
    }catch(err){
      toast('❌ Error al importar: '+err.message,'error');
    }
  };
  input.click();
}

// ── Hash pura JS (sin crypto.subtle — funciona en file://, HTTP y HTTPS) ──
function hashPwd(pwd){
  // cyrb53 × 4 rondas → 64 chars hex, determinista, sin APIs externas
  const str = pwd + ':rc_salt_v3_2024';
  let out = '';
  for(let r = 0; r < 4; r++){
    let h1 = 0xdeadbeef ^ r, h2 = 0x41c6ce57 ^ r;
    for(let i = 0; i < str.length; i++){
      const c = str.charCodeAt(i);
      h1 = Math.imul(h1 ^ c, 2654435761);
      h2 = Math.imul(h2 ^ c, 1597334677);
    }
    h1 = Math.imul(h1^(h1>>>16), 2246822507) ^ Math.imul(h2^(h2>>>13), 3266489909);
    h2 = Math.imul(h2^(h2>>>16), 2246822507) ^ Math.imul(h1^(h1>>>13), 3266489909);
    out += (4294967296*(2097151&h2)+(h1>>>0)).toString(16).padStart(16,'0');
  }
  return out;
}

// ══════════════ CLINICAL LOGIC ══════════════
const cycleInfo=pid=>{const n=DB.iForPat(pid).length;return{cycle:Math.floor(n/3)+1,dose:(n%3)+1,total:n};};
const nextDateFor=(date,dose)=>addDays(date,dose===3?90:30);
const patStatus=pid=>{
  const injs=DB.iForPat(pid);
  if(!injs.length)return{status:'sin-datos',label:'Sin procedimientos',cls:'b-gray',daysUntil:null,next:null};
  const last=injs[injs.length-1];
  if(!last.nextDate)return{status:'sin-fecha',label:'Sin fecha próxima',cls:'b-gray',daysUntil:null,next:null};
  const d=diffDays(today(),last.nextDate);
  if(d<-30)return{status:'muy-atrasado',label:'Muy atrasado',cls:'b-red',daysUntil:d,next:last.nextDate};
  if(d<0)  return{status:'atrasado',label:'Atrasado',cls:'b-amber',daysUntil:d,next:last.nextDate};
  if(d<=7) return{status:'esta-semana',label:'Esta semana',cls:'b-orange',daysUntil:d,next:last.nextDate};
  if(d<=30)return{status:'proximo',label:'Próximo',cls:'b-blue',daysUntil:d,next:last.nextDate};
  return{status:'en-seguimiento',label:'En seguimiento',cls:'b-green',daysUntil:d,next:last.nextDate};
};

function submitPat(e){
  e.preventDefault();const d=Object.fromEntries(new FormData(e.target));
  const errs=[];
  if(!d.ln?.trim())errs.push('El apellido es obligatorio.');
  if(!d.fn?.trim())errs.push('El nombre es obligatorio.');
  if(!d.cedula?.trim())errs.push('La cédula es obligatoria.');
  if(!d.phone?.trim())errs.push('El teléfono es obligatorio.');
  const dup=DB.pAll().find(p=>p.cedula.trim()===d.cedula.trim()&&p.id!==d.id);
  if(dup)errs.push(`Cédula ${esc(d.cedula)} ya registrada: ${esc(dup.ln)}, ${esc(dup.fn)}.`);
  const errDiv=document.getElementById('pf-err');
  if(errs.length){errDiv.className='form-err';errDiv.style.display='block';errDiv.innerHTML=errs.map(x=>`<div>⚠ ${x}</div>`).join('');errDiv.scrollIntoView({behavior:'smooth',block:'nearest'});return;}
  const pat={id:d.id||genId(),org_id:MY_ORG(),did:MY_DID(),fn:d.fn.trim(),ln:d.ln.trim(),cedula:d.cedula.trim(),phone:d.phone.trim(),email:(d.email||'').trim(),bd:d.bd||null,sex:d.sex||null,status:d.status||'activo',diag:d.diag||null,notes:(d.notes||'').trim(),req_seg:!!d.req_seg,nota_seg:(d.nota_seg||'').trim(),pendiente:!!d.pendiente,nota_pendiente:(d.nota_pendiente||'').trim(),createdAt:d.id?(DB.pGet(d.id)?.createdAt||today()):today()};
  DB.pSave(pat);toast(`✅ Paciente ${esc(pat.ln)}, ${esc(pat.fn)} ${!d.id?'creado':'actualizado'}.`,'success');
  nav('patient-hc',{pid:pat.id,tab:'enf-antec'});
}

function renderTab(enc,pat){
  switch(S.tab){
    case 'enf-antec':  return tabEnfAntec(enc);
    case 'antec':      return tabAntec(enc);
    case 'optomet':    return tabOptomet(enc);
    case 'examen':     return tabExamen(enc);
    case 'bio-pio':    return tabBioPio(enc);
    case 'dx-plan':    return tabDxPlan(enc);
    case 'qx':         return tabQx(enc,pat);
    case 'inyecciones':return tabInj(enc,pat);
    default:           return tabEnfAntec(enc);
  }
}

// ── ENCOUNTER ACTIONS ──
function eF(field,encId,val){const e=DB.eGet(encId);if(!e)return;const parts=field.split('.');if(parts.length===2){e[parts[0]]=e[parts[0]]||{};e[parts[0]][parts[1]]=val;}else{e[field]=val;}e.updatedAt=today();DB.eSave(e);}
function eAnt(key,encId,val){const e=DB.eGet(encId);if(!e)return;e.ant=e.ant||{};e.ant[key]=val;e.updatedAt=today();DB.eSave(e);}
function ePu(key,encId,val){const e=DB.eGet(encId);if(!e)return;e.pu=e.pu||{};e.pu[key]=val;e.updatedAt=today();DB.eSave(e);}
function saveEnc(id){const e=DB.eGet(id);if(!e)return;e.updatedAt=today();DB.eSave(e);toast('✅ Consulta guardada.','success');}
function newEnc(pid){const e=emptyEnc(pid);DB.eSave(e);S.encId=e.id;S.tab='enf-antec';toast('Nueva consulta creada.','success');nav('patient-hc',{pid,encId:e.id,tab:'enf-antec'});}
function loadEnc(id){S.encId=id;nav('patient-hc',{pid:S.pid,encId:id,tab:S.tab});}
function delEnc(id,pid){if(!confirm('¿Eliminar esta consulta?'))return;DB.eDel(id);const encs=DB.eForPat(pid);S.encId=encs.length?encs[0].id:null;nav('patient-hc',{pid,encId:S.encId,tab:'enf-antec'});}
function navEnc(dir,pid){
  const encs=DB.eForPat(pid);if(!encs.length)return;
  const idx=encs.findIndex(x=>x.id===S.encId);
  const newIdx=dir==='first'?encs.length-1:dir==='last'?0:dir==='prev'?Math.min(encs.length-1,idx+1):Math.max(0,idx-1);
  S.encId=encs[newIdx].id;nav('patient-hc',{pid,encId:S.encId,tab:S.tab});
}
function changeEncType(type,id){const e=DB.eGet(id);if(e){e.type=type;DB.eSave(e);}}
function changeEncDate(date,id){const e=DB.eGet(id);if(e){e.date=date;DB.eSave(e);}}
function switchTab(tab,encId){S.tab=tab;if(encId&&encId!=='undefined')S.encId=encId;const enc=DB.eGet(S.encId);const pat=DB.pGet(S.pid);if(!enc||!pat)return;document.querySelectorAll('.hc-tab').forEach(b=>b.classList.toggle('active',b.textContent.trim()===({'enf-antec':'Enf. A. Antec.','antec':'Antec.','optomet':'Optomet.','examen':'Exám','bio-pio':'Bio·Pio·Retina','dx-plan':'Dx y Plan','inyecciones':'Inyecciones'}[tab]||'')));document.getElementById('hc-content').innerHTML=renderTab(enc,pat);}

// ── PIO ──
function addPio(encId){const e=DB.eGet(encId);if(!e)return;e.pio=e.pio||[];e.pio.push({fecha:today(),hora:nowT(),od:'',oi:'',pqOD:'',pqOI:''});e.updatedAt=today();DB.eSave(e);document.getElementById('hc-content').innerHTML=renderTab(e,DB.pGet(e.pid));}
function remPio(i,encId){const e=DB.eGet(encId);if(!e)return;e.pio=(e.pio||[]).filter((_,idx)=>idx!==i);e.updatedAt=today();DB.eSave(e);document.getElementById('hc-content').innerHTML=renderTab(e,DB.pGet(e.pid));}
function updPio(i,f,encId,val){const e=DB.eGet(encId);if(!e||!e.pio[i])return;e.pio[i][f]=val;e.updatedAt=today();DB.eSave(e);}

// ── DX ──
function addDxToEnc(encId){
  const sel=document.getElementById('dx-sel');const diag=sel?.value||'';
  if(!diag){toast('⚠ Seleccione un diagnóstico.','warn');return;}
  const ojo=document.getElementById('dx-ojo')?.value||'AO';const fecha=document.getElementById('dx-fecha')?.value||today();
  const e=DB.eGet(encId);if(!e)return;e.dx_list=e.dx_list||[];e.dx_list.push({diag,ojo,fecha});e.updatedAt=today();DB.eSave(e);
  document.getElementById('hc-content').innerHTML=renderTab(e,DB.pGet(e.pid));
}
function remDx(i,encId){const e=DB.eGet(encId);if(!e)return;e.dx_list=(e.dx_list||[]).filter((_,idx)=>idx!==i);e.updatedAt=today();DB.eSave(e);document.getElementById('hc-content').innerHTML=renderTab(e,DB.pGet(e.pid));}

function updateClBadge(){
  const clf=document.getElementById('clf');
  const done=CL_ITEMS.filter(item=>clf?.querySelector(`[name="cl_${item.k}"]`)?.checked).length;
  const all=done===CL_ITEMS.length;
  const b=document.getElementById('cl-badge');
  if(b){b.className=`cl-status ${all?'ready':'pending'}`;b.textContent=all?'✅ Listo para cirugía':`⚠ ${done}/${CL_ITEMS.length} ítems completados`;}
}

function submitSx(e){
  e.preventDefault();const d=Object.fromEntries(new FormData(e.target));
  const procs=[...document.querySelectorAll('#sf input[name="proc"]:checked')].map(cb=>cb.value);
  const diagEl=document.getElementById('sel-sx-d');const diagVal=diagEl?diagEl.value:(d.diag||'');
  const errs=[];
  if(!d.pid)errs.push('Seleccione un paciente.');
  if(!d.date)errs.push('La fecha es obligatoria.');
  if(!d.eye)errs.push('Seleccione el ojo.');
  if(!procs.length)errs.push('Seleccione al menos un procedimiento.');
  const errDiv=document.getElementById('sf-err');
  if(errs.length){errDiv.className='form-err';errDiv.style.display='block';errDiv.innerHTML=errs.map(x=>`<div>⚠ ${x}</div>`).join('');errDiv.scrollIntoView({behavior:'smooth',block:'nearest'});return;}
  const clf=document.getElementById('clf');const checklist={};
  if(clf)CL_ITEMS.forEach(item=>{checklist[item.k]=!!(clf.querySelector(`[name="cl_${item.k}"]`)?.checked);});
  const sx={
    id:d.id||genId(),org_id:MY_ORG(),did:MY_DID(),pid:d.pid,
    date:d.date,eye:d.eye,procs,diag:diagVal||null,
    estado:d.estado||'programada',checklist,
    notes:(d.notes||'').trim(),
    createdAt:d.id?(DB.sxGet(d.id)?.createdAt||today()):today()
  };
  DB.sSave(sx);toast('✅ Cirugía registrada correctamente.','success');
  nav('patient-hc',{pid:sx.pid,tab:'qx'});
}

function saveChecklist(sxId,pid){
  if(!sxId){toast('⚠ Guarde la cirugía primero.','warn');return;}
  const sx=DB.sxGet(sxId);if(!sx)return;
  const clf=document.getElementById('clf');const checklist={};
  if(clf)CL_ITEMS.forEach(item=>{checklist[item.k]=!!(clf.querySelector(`[name="cl_${item.k}"]`)?.checked);});
  DB.sSave({...sx,checklist});
  updateClBadge();toast('✅ Checklist guardado.','success');
}

function delSx(id,pid){
  if(!confirm('¿Eliminar esta cirugía? Esta acción no puede deshacerse.'))return;
  DB.sDel(id);toast('Cirugía eliminada.','warn');
  if(pid){const enc=DB.eGet(S.encId)||{};document.getElementById('hc-content').innerHTML=renderTab(enc,DB.pGet(pid));}
  else{document.getElementById('view').innerHTML=renderView();}
}

function upCycleInfo(pid){if(!pid)return;const ci=cycleInfo(pid);const c=document.getElementById('ci-cyc'),ds=document.getElementById('ci-dos'),n=document.getElementById('ci-nxt');if(c)c.value=ci.cycle;if(ds)ds.value=ci.dose;if(n)n.value=nextDateFor(today(),ci.dose);}
function upNextDate(){const dose=parseInt(document.getElementById('ci-dos')?.value||'1');const n=document.getElementById('ci-nxt');if(n)n.value=nextDateFor(today(),dose);}
function submitInj(e){
  e.preventDefault();const d=Object.fromEntries(new FormData(e.target));

  if(errs.length){errDiv.className='form-err';errDiv.style.display='block';errDiv.innerHTML=errs.map(x=>`<div>⚠ ${x}</div>`).join('');return;}
  const inj={id:d.id||genId(),org_id:MY_ORG(),did:MY_DID(),pid:d.pid,date:d.date,eye:d.eye,med:d.med,diag:d.diag||null,cycle:parseInt(d.cycle)||1,dose:parseInt(d.dose)||1,nextDate:d.nextDate||null,notes:(d.notes||'').trim(),createdAt:d.id?(DB.iGet(d.id)?.createdAt||today()):today()};
  DB.iSave(inj);toast('✅ Inyección registrada.','success');nav('patient-hc',{pid:inj.pid,tab:'inyecciones'});
}

function submitProfile(e){

  const u=getUser(SESSION.uid);const updated={...u,name:d.name.trim(),spec:d.spec.trim(),clinic:d.clinic.trim(),initials:d.initials.trim().toUpperCase()};
  saveUser(updated);setSession(updated);

  toast('✅ Perfil actualizado.','success');errDiv.style.display='none';

function submitPwd(e){
  e.preventDefault();const d=Object.fromEntries(new FormData(e.target));
  const errs=[];if(!d.old_pwd)errs.push('Ingrese contraseña actual.');if(!d.new_pwd||d.new_pwd.length<6)errs.push('Mínimo 6 caracteres.');if(d.new_pwd!==d.new_pwd2)errs.push('Las contraseñas no coinciden.');
  const errDiv=document.getElementById('pwd-err');
  if(errs.length){errDiv.className='form-err';errDiv.style.display='block';errDiv.innerHTML=errs.map(x=>`<div>⚠ ${x}</div>`).join('');return;}
  const u=getUser(SESSION.uid);const oldHash=hashPwd(d.old_pwd);
  if(oldHash!==u.pwd){errDiv.className='form-err';errDiv.style.display='block';errDiv.innerHTML='<div>⚠ La contraseña actual es incorrecta.</div>';return;}
  saveUser({...u,pwd:hashPwd(d.new_pwd)});toast('✅ Contraseña actualizada.','success');e.target.reset();errDiv.style.display='none';
}

function submitAddDoc(e){
  e.preventDefault();const d=Object.fromEntries(new FormData(e.target));
  const errs=[];if(!d.name?.trim())errs.push('El nombre es obligatorio.');if(!d.email?.trim())errs.push('El email es obligatorio.');if(!d.pwd||d.pwd.length<6)errs.push('Contraseña mínimo 6 caracteres.');if(d.pwd!==d.pwd2)errs.push('Las contraseñas no coinciden.');if(getUserByEmail(d.email))errs.push(`Email ${esc(d.email)} ya registrado.`);
  const errDiv=document.getElementById('add-doc-err');
  if(errs.length){errDiv.className='form-err';errDiv.style.display='block';errDiv.innerHTML=errs.map(x=>`<div>⚠ ${x}</div>`).join('');return;}
  saveUser({id:genId(),org_id:MY_ORG(),email:d.email.trim().toLowerCase(),name:d.name.trim(),initials:(d.initials||d.name.substring(0,2)).toUpperCase(),spec:d.spec.trim(),clinic:d.clinic.trim(),role:d.role||'doctor',pwd:hashPwd(d.pwd),createdAt:today(),active:true});
  toast(`✅ Usuario creado.`,'success');document.getElementById('view').innerHTML=renderView();
}
function remDoc(uid){
  const u=getUser(uid);if(!u||!confirm(`¿Eliminar a ${u.name}?`))return;
  deleteUser(uid);toast(`Usuario eliminado.`,'warn');document.getElementById('view').innerHTML=renderView();
}
function delPat(id){const p=DB.pGet(id);if(!p||!confirm(`¿Eliminar a ${p.ln}, ${p.fn}?`))return;DB.pDel(id);toast('Paciente eliminado.','warn');nav('patients',{pid:null});}

// ══════════════ PENDIENTE TOGGLE ══════════════
function togglePendiente(pid,state){
  const p=DB.pGet(pid);if(!p)return;
  if(state){
    const nota=prompt('Nota para el pendiente (opcional):','');
    DB.pSave({...p,pendiente:true,nota_pendiente:(nota||'').trim()});
    toast('⚠ Paciente marcado como pendiente.','warn');
  } else {
    DB.pSave({...p,pendiente:false,nota_pendiente:''});
    toast('✅ Pendiente resuelto.','success');
  }
  nav('patient-hc',{pid,encId:S.encId,tab:S.tab});
}

// ══════════════ VIEW: AGENDA ══════════════
function vAgenda(){
  const td=today();const pats=DB.pAll();const citas=DB.citaAll();

  const citasHoy=citas.filter(c=>c.date===td&&c.estado==='programada').sort((a,b)=>a.time.localeCompare(b.time));

  const pendientes=pats.filter(p=>p.pendiente);
  // --- SEGUIMIENTO (inyecciones) ---
  const withSt=pats.map(p=>({...p,st:patStatus(p.id)}));
  const muyAtrasados=withSt.filter(p=>p.st.status==='muy-atrasado').sort((a,b)=>a.st.daysUntil-b.st.daysUntil);

        </div>

      </div>
      ${urgentes>0?`<div class="alert-block red" style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="S.agendaTab='seguimiento';document.getElementById('view').innerHTML=renderView()">
        <span style="font-size:18px">🚨</span>
        <div><strong>${urgentes} paciente${urgentes!==1?'s':''}</strong> con inyecciones vencidas requieren atención urgente.

      </div>`:''}
      ${citasHoy.length===0?`<div class="card pad" style="text-align:center;padding:40px 20px">
        <div style="font-size:32px;margin-bottom:10px">📅</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:5px">Sin citas programadas para hoy</div>

              <div class="cita-actions" onclick="event.stopPropagation()">

    <div class="agenda-tabs">

          ${CITA_TIPOS.map(t=>`<option value="${t.v}" ${(d.tipo||'consulta')===t.v?'selected':''}>${t.ico} ${t.l}</option>`).join('')}
        </select>

      <div class="fg"><label class="fl">Notas / Motivo</label>
        <textarea class="ft" name="notas" rows="2"
          placeholder="Ej: control post-inyección, traer resultados de laboratorio…">${esc(d.notas||'')}</textarea>

        <button type="submit" class="btn btn-teal">${isEdit?'💾 Guardar Cambios':'📅 Agendar Cita'}</button>

function submitCita(e){
  e.preventDefault();const d=Object.fromEntries(new FormData(e.target));
  const errs=[];if(!d.pid)errs.push('Seleccione un paciente.');if(!d.date)errs.push('La fecha es obligatoria.');
  const errDiv=document.getElementById('cf-err');
  if(errs.length){errDiv.className='form-err';errDiv.style.display='block';errDiv.innerHTML=errs.map(x=>`<div>⚠ ${x}</div>`).join('');return;}
  const isNew=!d.id;
  const cita={id:d.id||genId(),org_id:MY_ORG(),did:MY_DID(),pid:d.pid,date:d.date,time:d.time||'',tipo:d.tipo||'consulta',estado:d.estado||'programada',notas:(d.notas||'').trim(),createdAt:d.id?undefined:today()};
  DB.citaSave(cita);
  toast(`✅ Cita ${isNew?'agendada':'actualizada'} para ${fmtD(d.date)}.`,'success');
  // If patient was pending, option to resolve
  const p=DB.pGet(d.pid);
  if(p?.pendiente && isNew && confirm(`${esc(p.ln)}, ${esc(p.fn)} está marcado como pendiente.\n¿Marcar como resuelto ahora que tiene cita agendada?`)){
    DB.pSave({...p,pendiente:false,nota_pendiente:''});
  }
  nav(d.pid?'patient-hc':'agenda',d.pid?{pid:d.pid,tab:'enf-antec'}:{agendaTab:'hoy'});
}
function markCitaAtendida(id){
  const c=DB.citaAll().find(x=>x.id===id);if(!c)return;
  DB.citaSave({...c,estado:'atendida'});toast('✅ Cita marcada como atendida.','success');
  document.getElementById('view').innerHTML=renderView();
}
function delCita(id){
  if(!confirm('¿Eliminar esta cita?'))return;
  DB.citaDel(id);toast('Cita eliminada.','warn');document.getElementById('view').innerHTML=renderView();
}

// ══════════════ NOTIFICATION BADGE ══════════════
function updateNotifBadge(){
  const pats=DB.pAll();
  const urgentes=pats.filter(p=>{const st=patStatus(p.id);return st.status==='muy-atrasado'||st.status==='atrasado';}).length;
  const pendientes=pats.filter(p=>p.pendiente).length;
  const total=urgentes+pendientes;
  const dot=document.getElementById('notif-dot');
  if(dot){dot.style.display=total?'flex':'none';dot.textContent=total>9?'9+':String(total);}
}

  const injPrev = allI.filter(i=>i.date.startsWith(prevPrefix));
  const sxPrev  = allS.filter(s=>s.date.startsWith(prevPrefix));

  const trend=(curr,prev)=>{
    if(!prev) return{icon:'→',cls:'trend-flat',txt:'sin comparación'};
    const d=curr-prev;
    if(d>0) return{icon:'↑',cls:'trend-up',txt:`+${d} vs ${period==='mes'?'mes anterior':'año anterior'}`};
    if(d<0) return{icon:'↓',cls:'trend-down',txt:`${d} vs ${period==='mes'?'mes anterior':'año anterior'}`};
    return{icon:'→',cls:'trend-flat',txt:`igual al ${period==='mes'?'mes':'año'} anterior`};
  };
  const tI=trend(injP.length,injPrev.length);
  const tS=trend(sxP.length,sxPrev.length);

  // Follow-up status counts
  const statusCounts = pats.reduce((acc,p)=>{

  // Top medications (all time for this doctor)
  const byMed  = allI.reduce((a,i)=>{a[i.med]=(a[i.med]||0)+1;return a;},{});
  const topMed = Object.entries(byMed).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxMed = topMed[0]?.[1]||1;

  // Top diagnoses
  const byDx   = allI.filter(i=>i.diag).reduce((a,i)=>{a[i.diag]=(a[i.diag]||0)+1;return a;},{});
  const topDx  = Object.entries(byDx).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxDx  = topDx[0]?.[1]||1;

  // Top procedures
  const byProc = allS.reduce((a,s)=>{(s.procs||[]).forEach(p=>{a[p]=(a[p]||0)+1;});return a;},{});
  const topProc= Object.entries(byProc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxProc= topProc[0]?.[1]||1;

  // Last 6 months data for chart

  });

  // Recent activity (last 8 events combined)
  const recentI = [...allI].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4).map(i=>({date:i.date,type:'inj',ico:'💉',title:`Inyección ${i.eye}`,sub:`${i.med}${i.diag?' · '+i.diag:''}`,pid:i.pid}));
  const recentS = [...allS].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4).map(s=>({date:s.date,type:'sx',ico:'🔬',title:(s.procs||[]).slice(0,2).join(', ')||'Cirugía',sub:`${s.eye}${s.diag?' · '+s.diag:''}`,pid:s.pid}));
  const recentAll= [...recentI,...recentS].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);

  const pName=pid=>{const p=pats.find(x=>x.id===pid);return p?`${p.ln}, ${p.fn}`:'—';};

  // Status colors
  const STATUS_COLORS={
    'sin-datos':'#94a3b8','muy-atrasado':'#e53e3e','atrasado':'#d69e2e',
    'esta-semana':'#dd6b20','proximo':'#3182ce','en-seguimiento':'#38a169','sin-fecha':'#cbd5e0'
  };
  const STATUS_LABELS={
    'sin-datos':'Sin procedimientos','muy-atrasado':'Muy atrasado','atrasado':'Atrasado',
    'esta-semana':'Esta semana','proximo':'Próximo','en-seguimiento':'En seguimiento','sin-fecha':'Sin fecha'
  };

  // Bar chart fill %
  const kpiBarPct=(curr,prev)=>prev?Math.min(100,Math.round((curr/Math.max(curr,prev))*100)):100;

  const periodLabel = period==='mes'
    ? `${MNAMES[parseInt(ym.split('-')[1])-1]} ${yr}`
    : `Año ${yr}`;

  setTimeout(()=>{
    // Chart 1: Activity last 6 months (bar)
    const ctx1=document.getElementById('ch-activity');
    if(ctx1){
      _charts.activity=new Chart(ctx1,{
        type:'bar',
        data:{
          labels:last6.map(d=>d.lbl),
          datasets:[
            {label:'Inyecciones',data:last6.map(d=>d.inj),backgroundColor:'rgba(49,130,206,.8)',borderRadius:4,borderSkipped:false},
            {label:'Cirugías',   data:last6.map(d=>d.sx), backgroundColor:'rgba(11,197,234,.8)',borderRadius:4,borderSkipped:false},
            {label:'Citas',      data:last6.map(d=>d.citas),backgroundColor:'rgba(56,161,105,.5)',borderRadius:4,borderSkipped:false}
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'DM Sans'},boxWidth:12,padding:14}}},
          scales:{
            y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{font:{size:11,family:'DM Sans'},stepSize:1}},
            x:{grid:{display:false},ticks:{font:{size:11,family:'DM Sans'}}}

          data:{
            labels:entries.map(([k])=>STATUS_LABELS[k]||k),
            datasets:[{data:entries.map(([,v])=>v),backgroundColor:entries.map(([k])=>STATUS_COLORS[k]||'#94a3b8'),borderWidth:2,borderColor:'#fff',hoverBorderColor:'#fff'}]
          },
          options:{
            responsive:true,maintainAspectRatio:false,cutout:'68%',
            plugins:{legend:{position:'right',labels:{font:{size:11,family:'DM Sans'},boxWidth:11,padding:10}}}
          }
        });
      }
    }
    // Chart 3: Monthly trend line (only annual period)
    const ctx3=document.getElementById('ch-trend');
    if(ctx3&&period==='anio'){

        const mp=`${yr}-${String(i+1).padStart(2,'0')}`;
        return{l:MNAMES[i].substring(0,3),inj:allI.filter(x=>x.date.startsWith(mp)).length};
      });
      _charts.trend=new Chart(ctx3,{
        type:'line',
        data:{
          labels:mData.map(d=>d.l),
          datasets:[{
            label:'Inyecciones mensuales',data:mData.map(d=>d.inj),
            borderColor:'#3182ce',backgroundColor:'rgba(49,130,206,.1)',
            borderWidth:2.5,fill:true,tension:.4,
            pointBackgroundColor:'#3182ce',pointRadius:4,pointHoverRadius:6
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:11}}}}
        }
      });
    }
  },50);

  return PH('Dashboard',`Actividad clínica · ${periodLabel} · ${SESSION.name}`,
    `<button class="btn btn-ghost btn-sm" onclick="printReport('${period==='mes'?'mes':'anio'}')">🖨 Imprimir Reporte</button>`)
  +`<div class="ca">
    <!-- Period selector -->
    <div class="period-tabs">
      ${[{v:'mes',l:'Este Mes'},{v:'anio',l:'Este Año'}].map(p=>`
        <button class="period-tab ${(S.dashPeriod||'mes')===p.v?'active':''}"
          onclick="S.dashPeriod='${p.v}';document.getElementById('view').innerHTML=renderView();setTimeout(()=>{/* charts init via setTimeout in renderView */},0)">
          ${p.l}
        </button>`).join('')}
      <span style="margin-left:auto;font-size:12px;color:var(--g400);display:flex;align-items:center">${periodLabel}</span>
    </div>

    <!-- KPI Row 1 -->
    <div class="dash-grid mb16">
      <div class="dash-kpi blue">
        <span class="dash-kpi-ico">💉</span>

        <div class="dash-kpi-trend ${tI.cls}">${tI.icon} ${tI.txt}</div>
        <div class="dash-kpi-bar"><div class="dash-kpi-bar-fill" style="width:${kpiBarPct(injP.length,injPrev.length)}%"></div></div>
      </div>
      <div class="dash-kpi teal">
        <span class="dash-kpi-ico">🔬</span>
        <div class="dash-kpi-lbl">Cirugías</div>
        <div class="dash-kpi-val">${sxP.length}</div>
        <div class="dash-kpi-sub">${periodLabel}</div>
        <div class="dash-kpi-trend ${tS.cls}">${tS.icon} ${tS.txt}</div>

      </div>

        <div class="dash-kpi-lbl">Pacientes nuevos</div>

        <div class="dash-kpi-bar"><div class="dash-kpi-bar-fill" style="width:${patP.length?100:0}%"></div></div>
      </div>

    <div class="dash-grid mb16">
      ${[

        {ico:'🔬',lbl:'Total cirugías',val:allS.length,sub:'histórico',cls:'teal'},

      <div class="chart-card">

        <div class="chart-card-sub">Distribución de pacientes por estado IVT</div>
        <div class="chart-wrap" style="height:220px">
          ${pats.length?`<canvas id="ch-status"></canvas>`:`<div style="display:flex;align-items:center;justify-content:center;height:220px;color:var(--g400);font-size:13px">Sin pacientes registrados</div>`}
        </div>

    <!-- Second charts row (annual only: trend line) -->
    ${period==='anio'?`<div class="chart-card" style="margin-bottom:16px">
      <div class="chart-card-title">Tendencia de Inyecciones — ${yr}</div>
      <div class="chart-card-sub">Evolución mensual de inyecciones intravítreas en el año</div>
      <div class="chart-wrap" style="height:160px"><canvas id="ch-trend"></canvas></div>

    <!-- Bottom stats row -->

      <!-- Top medicamentos -->
      <div class="chart-card">
        <div class="chart-card-title">Medicamentos más usados</div>
        <div class="chart-card-sub">Todas las inyecciones registradas</div>
        ${topMed.length?topMed.map(([m,n])=>`<div class="mini-bar-row">
          <div class="mini-bar-label" title="${esc(m)}">${esc(m)}</div>
          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${Math.round((n/maxMed)*100)}%;background:var(--blue)"></div></div>
          <div class="mini-bar-num">${n}</div>
        </div>`).join(''):`<div class="empty-mini">Sin inyecciones registradas.</div>`}
      </div>

      <!-- Top diagnósticos -->
      <div class="chart-card">
        <div class="chart-card-title">Diagnósticos frecuentes</div>
        <div class="chart-card-sub">Por frecuencia en inyecciones</div>
        ${topDx.length?topDx.map(([d,n])=>`<div class="mini-bar-row">
          <div class="mini-bar-label" title="${esc(d)}">${esc(d)}</div>
          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${Math.round((n/maxDx)*100)}%;background:var(--teal)"></div></div>
          <div class="mini-bar-num">${n}</div>
        </div>`).join(''):`<div class="empty-mini">Sin diagnósticos registrados.</div>`}
      </div>

      <!-- Actividad reciente -->
      <div class="chart-card">
        <div class="chart-card-title">Actividad Reciente</div>
        <div class="chart-card-sub">Últimos procedimientos registrados</div>
        ${recentAll.length?recentAll.map(a=>`<div class="activity-item">
          <div class="activity-dot ${a.type}"></div>
          <div class="activity-content">
            <div class="activity-title">${a.ico} ${esc(a.title)}</div>
            <div class="activity-meta">${esc(pName(a.pid))} · ${fmtD(a.date)}</div>
            ${a.sub?`<div class="activity-meta">${esc(a.sub)}</div>`:''}
          </div>
        </div>`).join(''):`<div class="empty-mini">Sin actividad reciente.</div>`}
      </div>
    </div>

    <!-- Procedures row (if any surgeries) -->
    ${topProc.length?`<div class="chart-card" style="margin-top:12px">
      <div class="chart-card-title">Procedimientos Quirúrgicos más frecuentes</div>
      <div class="chart-card-sub">Todos los procedimientos registrados en cirugías</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px">
        ${topProc.map(([p,n])=>`<div class="mini-bar-row">
          <div class="mini-bar-label" title="${esc(p)}">${esc(p)}</div>
          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${Math.round((n/maxProc)*100)}%;background:var(--teal)"></div></div>
          <div class="mini-bar-num">${n}</div>
        </div>`).join('')}
      </div>
    </div>`:''}

  </div>`;
}

// ── Supabase settings actions ──
function copySQL(){
  const ta=document.querySelector('textarea[readonly]');
  if(ta){navigator.clipboard.writeText(ta.value).then(()=>toast('✅ SQL copiado al portapapeles.','success'));}
}
async function testSbConnection(){
  const url=(document.getElementById('sb-url-in')?.value||'').trim();
  const key=(document.getElementById('sb-key-in')?.value||'').trim();
  if(!url||!key){toast('⚠ Ingrese URL y clave primero.','warn');return;}
  toast('🔌 Probando conexión…','');
  const ok=await sbTestConnection(url,key);
  if(ok){toast('✅ Conexión exitosa. Supabase responde correctamente.','success');}
  else{toast('❌ No se pudo conectar. Verifique la URL y la clave.','error');}
}
function saveSbConfig(e){
  e.preventDefault();
  const url=(document.getElementById('sb-url-in')?.value||'').trim();
  const key=(document.getElementById('sb-key-in')?.value||'').trim();
  const errDiv=document.getElementById('sb-err');
  if(!url||!url.startsWith('https://')){errDiv.className='form-err';errDiv.style.display='block';errDiv.innerHTML='<div>⚠ La URL debe comenzar con https://</div>';return;}
  if(!key||key.length<20){errDiv.className='form-err';errDiv.style.display='block';errDiv.innerHTML='<div>⚠ La clave parece incorrecta (muy corta).</div>';return;}
  sSet('rc_sb_url',url); sSet('rc_sb_key',key); sSet('rc_sb_status','offline');
  toast('✅ Configuración guardada. Probando conexión…','success');
  sbTestConnection(url,key).then(ok=>{
    sSet('rc_sb_status',ok?'online':'error');
    updateSbIndicator();
    if(ok){
      toast('☁ Conexión verificada. Sus datos ahora se sincronizan automáticamente.','success');
      document.getElementById('view').innerHTML=renderView();
    } else {
      toast('⚠ Guardado pero la conexión falló. Verifique las credenciales.','warn');
    }
  });
}
function disconnectSb(){
  if(!confirm('¿Desconectar el backend?\n\nSus datos locales permanecerán intactos, pero se dejarán de sincronizar.')) return;
  sSet('rc_sb_url',''); sSet('rc_sb_key',''); sSet('rc_sb_status','offline');
  updateSbIndicator();
  toast('Backend desconectado.','warn');
  document.getElementById('view').innerHTML=renderView();
}
async function syncNow(){
  if(!sbOK()){toast('⚠ Configure el backend primero.','warn');return;}
  toast('🔄 Sincronizando…','');
  const pulled=await sbPull();
  if(pulled){toast('✅ Sincronización completada.','success');nav('patients');}
  else{toast('⚠ Sin datos nuevos en el servidor.','success');}
}
async function pushAllToSupabase(){
  if(!sbOK()){toast('⚠ Configure el backend primero.','warn');return;}
  toast('☁ Subiendo todos los datos…','');
  const r=await sbPushAll();
  if(r.ok){toast(`✅ ${r.total} registros subidos correctamente.`,'success');}
  else{toast('❌ Error: '+r.msg,'error');}
}

function addCatalogItem(type){
  const inp=document.getElementById(`new-${type}-cfg`);const name=(inp?.value||'').trim();
  if(!name){toast('⚠ Ingrese un nombre.','warn');return;}
  if(type==='diag'){
    if(getDiags().find(x=>x.name.toLowerCase()===name.toLowerCase())){toast(`"${name}" ya existe.`,'warn');return;}
    addDiag(name);
  } else {
    if(getSxTipos().find(x=>x.name.toLowerCase()===name.toLowerCase())){toast(`"${name}" ya existe.`,'warn');return;}
    addSxTipo(name);
  }
  toast(`✅ "${name}" agregado.`,'success');
  document.getElementById('view').innerHTML=renderView();
}
function removeCatalogItem(type,id){
  if(!confirm('¿Eliminar este elemento?'))return;
  type==='diag'?delDiag(id):delSxTipo(id);
  toast('Elemento eliminado.','warn');
  document.getElementById('view').innerHTML=renderView();
}

function showApp(){
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tb-name').textContent=SESSION.name;
  document.getElementById('tb-spec').textContent=SESSION.spec||'';
  document.getElementById('tb-av').textContent=SESSION.initials;
  document.getElementById('tb-uname').textContent=SESSION.name.split(' ').slice(-1)[0];
  document.getElementById('tb-role-label').textContent=SESSION.role==='super_admin'?'👑 Super Administrador':'🩺 Doctor';
  document.getElementById('tb-date').textContent=fmtDateLong();
  setInterval(()=>document.getElementById('tb-date').textContent=fmtDateLong(),60000);
  if(SESSION.role==='super_admin')document.getElementById('admin-dd').style.display='block';
  nav('patients');
  setTimeout(updateNotifBadge,100);
  // Pull latest data from Supabase in background (non-blocking)
  if(sbOK()){ sbPull().then(pulled=>{ if(pulled){ nav('patients'); toast('☁ Datos sincronizados desde backend.','success'); } }); }
  updateSbIndicator();
}

function doLogin(){
  const btn=document.getElementById('login-btn'),errDiv=document.getElementById('login-err');
  const email=document.getElementById('login-email').value.trim(),pwd=document.getElementById('login-pwd').value;
  if(!email||!pwd){errDiv.style.display='block';errDiv.textContent='⚠ Complete email y contraseña.';return;}
  btn.disabled=true;btn.textContent='Verificando…';errDiv.style.display='none';
  try{
    const user=getUserByEmail(email);
    if(!user)throw new Error('Email no registrado en el sistema.');
    const hash=hashPwd(pwd);
    if(hash!==user.pwd)throw new Error('Contraseña incorrecta.');
    if(user.active===false)throw new Error('Esta cuenta está desactivada.');
    setSession(user);showApp();
  }catch(err){
    errDiv.style.display='block';errDiv.textContent='⚠ '+err.message;
    btn.disabled=false;btn.textContent='Ingresar al Sistema';
  }
}


function boot(){seedIfNeeded();if(loadSession()){showApp();}else{document.getElementById('login-overlay').style.display='flex';}}
boot();
